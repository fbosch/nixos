name: Secret Scan

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: "0 5 * * 1" # weekly on Monday
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-secret-scan
  cancel-in-progress: true

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@a7bdcf95222c4369422764e168fad84fc912f0dc # main, 2026-07-16
        with:
          extra_args: --results=verified,unknown
