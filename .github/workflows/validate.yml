name: Validate

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-validate
  cancel-in-progress: true

env:
  NIX_CONFIG: |
    extra-experimental-features = nix-command flakes
    extra-substituters = https://attic.xuyh0120.win/lantian https://cache.garnix.io https://hyprland.cachix.org https://comfyui.cachix.org https://nix-community.cachix.org https://cuda-maintainers.cachix.org
    extra-trusted-public-keys = lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g= hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc= comfyui.cachix.org-1:33mf9VzoIjzVbp0zwj+fT51HG0y31ZTK3nzYZAX0rec= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cuda-maintainers.cachix.org-1:0dq3bujKpuEPMCX6U4WylrUDZ9JyUG0VpVZa7CNfq5E=

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup-nix
        with:
          cachix-name: fbosch
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Lint
        run: nix run .#lint

  flake-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup-nix
        with:
          cachix-name: fbosch
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Flake checks
        run: nix flake check --print-build-logs --keep-going

  discover-hosts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: flake-check
    outputs:
      nixos-hosts: ${{ steps.discover.outputs.nixos-hosts }}
      darwin-hosts: ${{ steps.discover.outputs.darwin-hosts }}
      has-nixos: ${{ steps.discover.outputs.has-nixos }}
      has-darwin: ${{ steps.discover.outputs.has-darwin }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nix
        with:
          cachix-name: fbosch
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Discover host matrices
        id: discover
        run: ./scripts/ci/discover-hosts.sh validate

  build-nixos:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [flake-check, discover-hosts]
    if: needs.discover-hosts.outputs.has-nixos == 'true'
    strategy:
      matrix:
        host: ${{ fromJson(needs.discover-hosts.outputs.nixos-hosts) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup-nix
        with:
          cachix-name: fbosch
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.host }}
        run: |
          nix build ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel" --no-link --print-build-logs

  eval-darwin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [flake-check, discover-hosts]
    if: needs.discover-hosts.outputs.has-darwin == 'true'
    strategy:
      matrix:
        host: ${{ fromJson(needs.discover-hosts.outputs.darwin-hosts) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup-nix
        with:
          cachix-name: fbosch
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Evaluate ${{ matrix.host }}
        run: |
          nix eval ".#darwinConfigurations.${{ matrix.host }}.config.system.build.toplevel" --json > /dev/null
