name: NPM Globals Audit

on:
  pull_request:
    branches: [main, master]
    paths:
      - "modules/development/nodejs.nix"
      - "modules/development/npm-globals/**"
      - ".github/workflows/npm-globals-audit.yml"
  push:
    branches: [main, master]
    paths:
      - "modules/development/nodejs.nix"
      - "modules/development/npm-globals/**"
      - ".github/workflows/npm-globals-audit.yml"
  schedule:
    - cron: "0 7 * * 1" # weekly on Monday
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-npm-globals-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/setup-nix
        with:
          cachix-name: fbosch
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Refresh lockfile from package specifiers
        working-directory: modules/development/npm-globals
        run: |
          nix shell nixpkgs#nodejs_24 nixpkgs#pnpm --command bash -c "
            pnpm install --lockfile-only
          "

      - name: Verify lockfile is committed
        run: git diff --exit-code -- modules/development/npm-globals/pnpm-lock.yaml

      - name: Install dependencies from lockfile
        working-directory: modules/development/npm-globals
        run: |
          nix shell nixpkgs#nodejs_24 nixpkgs#pnpm --command bash -c "
            pnpm install --frozen-lockfile --ignore-scripts=false
          "

      - name: Audit production dependencies
        working-directory: modules/development/npm-globals
        run: |
          nix shell nixpkgs#nodejs_24 nixpkgs#pnpm --command bash -c "
            pnpm audit --prod --audit-level=critical
          "
