name: Trivy Container Scan
description: Run Trivy scan and upload SARIF results
inputs:
  image-ref:
    description: Container image reference to scan
    required: true
  safe-name:
    description: Filesystem-safe identifier for report artifacts
    required: true
  trivy-version:
    description: Trivy binary version to install (without leading v)
    required: false
    default: "0.69.2"
runs:
  using: composite
  steps:
    - name: Install Trivy
      shell: bash
      run: |
        curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${{ inputs.trivy-version }}/trivy_${{ inputs.trivy-version }}_Linux-64bit.deb" \
          -o /tmp/trivy.deb
        sudo dpkg -i /tmp/trivy.deb

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
      with:
        image-ref: ${{ inputs.image-ref }}
        format: sarif
        output: trivy-results-${{ inputs.safe-name }}.sarif
        severity: CRITICAL,HIGH,MEDIUM
        exit-code: "0"
        skip-setup-trivy: true

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4
      with:
        sarif_file: trivy-results-${{ inputs.safe-name }}.sarif
        category: trivy-${{ inputs.safe-name }}

    - name: Run Trivy for PR comment
      uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
      with:
        image-ref: ${{ inputs.image-ref }}
        format: table
        severity: CRITICAL,HIGH
        exit-code: "0"
        skip-setup-trivy: true
